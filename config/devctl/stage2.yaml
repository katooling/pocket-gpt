required_files:
  - scenario-a.csv
  - scenario-b.csv
  - stage-2-threshold-input.csv
  - model-2b-metrics.csv
  - meminfo-0-8b-scenario-a.txt
  - meminfo-0-8b-scenario-b.txt
  - meminfo-2b-scenario-a.txt
  - meminfo-2b-scenario-b.txt
  - threshold-report.txt
  - runtime-evidence-validation.txt
  - runtime-log-signals.json
  - runtime-log-signals.md
  - logcat.txt
  - notes.md
  - summary.json

quick_required_files:
  - scenario-a.csv
  - scenario-b.csv
  - stage-2-threshold-input.csv
  - logcat.txt
  - notes.md
  - threshold-report.txt
  - runtime-evidence-validation.txt
  - runtime-log-signals.json
  - runtime-log-signals.md
  - summary.json

threshold_csv:
  columns:
    - scenario
    - first_token_ms
    - decode_tps
    - tokens
    - runs

summary_json:
  fields:
    - stage
    - device_id
    - run_date
    - run_dir
    - scenario_a_csv
    - scenario_b_csv
    - threshold_input_csv
    - model_2b_metrics_csv
    - threshold_report
    - runtime_evidence_validation_report
    - runtime_log_signals_json
    - runtime_log_signals_markdown
    - runtime_log_signals_status
    - runtime_log_signals_issue_count
    - logcat
    - notes
    - summary_json
    - threshold_exit_code
    - runtime_evidence_exit_code
    - profile
    - models
    - scenarios
    - resume_used
    - install_mode
    - apk_install_skipped
    - model_provision_skipped
    - strict_thresholds
    - model_load_mode
    - prefix_cache_enabled
    - prefix_cache_hits
    - prefix_cache_misses
    - prefill_tokens_reused
    - warm_vs_cold_first_token_delta_ms
    - evidence_draft
    - evidence_note_path

adb_logcat_timeout_seconds: 15

templates:
  notes: docs/operations/evidence/wp-03/templates/notes.md
  scenario_a: docs/operations/evidence/wp-03/templates/scenario-a.csv
  scenario_b: docs/operations/evidence/wp-03/templates/scenario-b.csv
