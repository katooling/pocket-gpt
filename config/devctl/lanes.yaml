lanes:
  test:
    requires_android_sdk: false
    requires_device: false
    artifacts:
      output_dir_template: build/test-results
    commands:
      - name: python_unit_tests
        argv:
          - python3
          - -m
          - unittest
          - discover
          - -s
          - tools/devctl/tests
    gradle_binary: ./gradlew
    gradle_flags:
      - --no-daemon
    common_tasks:
      - :packages:core-domain:test
      - :packages:inference-adapters:test
      - :packages:tool-runtime:test
      - :packages:memory:test
      - :packages:native-bridge:test
      - :packages:app-runtime:test
      - :apps:mobile-android-host:test
    android_tasks:
      - :apps:mobile-android:testDebugUnitTest

  device:
    requires_android_sdk: false
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/{label}-{stamp}
    commands:
      - name: stage_checks
        argv:
          - bash
          - scripts/android/run_stage_checks.sh
      - name: capture_baseline
        argv:
          - bash
          - scripts/android/capture_device_baseline.sh
      - name: apply_benchmark_settings
        argv:
          - bash
          - scripts/android/configure_device_for_benchmark.sh
          - apply
      - name: reset_benchmark_settings
        argv:
          - bash
          - scripts/android/configure_device_for_benchmark.sh
          - reset
      - name: run_short_loop
        argv:
          - bash
          - scripts/android/run_short_loop.sh
    default_scenario_command:
      - ./gradlew
      - --no-daemon
      - :apps:mobile-android-host:run

  stage2:
    requires_android_sdk: false
    requires_device: false
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}
    threshold_command:
      - python3
      - scripts/benchmarks/evaluate_thresholds.py

  android-instrumented:
    requires_android_sdk: true
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/android-instrumented/{stamp}
    commands:
      - name: install_debug
        argv:
          - ./gradlew
          - --no-daemon
          - :apps:mobile-android:installDebug
      - name: install_debug_android_test
        argv:
          - ./gradlew
          - --no-daemon
          - :apps:mobile-android:installDebugAndroidTest
      - name: connected_debug_android_test
        argv:
          - ./gradlew
          - --no-daemon
          - :apps:mobile-android:connectedDebugAndroidTest

  maestro:
    requires_android_sdk: false
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/maestro/{stamp}
    version: 1.39.13
    preflight_commands:
      -
        - ./gradlew
        - --no-daemon
        - :apps:mobile-android:installDebug
    flows:
      - tests/maestro/scenario-onboarding.yaml
      - tests/maestro/scenario-a.yaml
      - tests/maestro/scenario-b.yaml
      - tests/maestro/scenario-c.yaml
      - tests/maestro/scenario-activation-send-smoke.yaml

  journey:
    requires_android_sdk: true
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/journey/{stamp}
    repeats_default: 1
    repeats_max: 5
    reply_timeout_seconds_default: 180
    capture_intervals_default:
      - 5
      - 15
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
    prompt_default: "Reply with exactly: OK."

  fast-smoke:
    requires_android_sdk: true
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/journey/{stamp}
    repeats_default: 1
    repeats_max: 5
    reply_timeout_seconds_default: 60
    capture_intervals_default:
      - 5
      - 15
      - 30
      - 60
    prompt_default: "ola, how you doin"

  valid-output:
    requires_android_sdk: true
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/journey/{stamp}
    repeats_default: 1
    repeats_max: 5
    reply_timeout_seconds_default: 480
    capture_intervals_default:
      - 5
      - 15
      - 30
      - 60
      - 90
      - 120
      - 180
      - 240
      - 300
      - 420
      - 480
    prompt_default: "ola, how you doin"

  strict-journey:
    requires_android_sdk: true
    requires_device: true
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/journey/{stamp}
    repeats_default: 1
    repeats_max: 5
    reply_timeout_seconds_default: 180
    capture_intervals_default:
      - 5
      - 15
      - 30
      - 60
      - 90
      - 120
      - 150
      - 180
    prompt_default: "Reply with exactly: OK."

  nightly-hardware:
    requires_android_sdk: false
    requires_device: false
    artifacts:
      output_dir_template: scripts/benchmarks/runs/{date}/{device}/nightly
    commands: []

  real-runtime:
    cache_root_candidates:
      - ~/.cache/pocket-gpt/models/qwen3.5
      - ~/.cache/pocket-gpt/models
    device_model_dir: /sdcard/Android/media/com.pocketagent.android/models
    models:
      - model_id: qwen3.5-0.8b-q4
        cache_patterns:
          - Qwen3.5-0.8B-Q4_0.gguf
          - Qwen3.5-0.8B-UD-IQ2_XXS.gguf
          - qwen3.5-0.8b-q4.gguf
          - "**/Qwen3.5-0.8B-Q4_0.gguf"
          - "**/Qwen3.5-0.8B-UD-IQ2_XXS.gguf"
          - "**/qwen3.5-0.8b-q4.gguf"
        device_file_name: qwen3.5-0.8b-q4.gguf
      - model_id: qwen3.5-2b-q4
        cache_patterns:
          - Qwen3.5-2B-Q4_0.gguf
          - Qwen3.5-2B-UD-IQ2_XXS.gguf
          - qwen3.5-2b-q4.gguf
          - "**/Qwen3.5-2B-Q4_0.gguf"
          - "**/Qwen3.5-2B-UD-IQ2_XXS.gguf"
          - "**/qwen3.5-2b-q4.gguf"
        device_file_name: qwen3.5-2b-q4.gguf
    app_package: com.pocketagent.android
    instrumentation_runner: com.pocketagent.android.test/androidx.test.runner.AndroidJUnitRunner
    provisioning_test_class: com.pocketagent.android.RealRuntimeProvisioningInstrumentationTest#seedModelsAndVerifyStartupChecks
    journey_test_class: com.pocketagent.android.RealRuntimeJourneyInstrumentationTest#runCoreJourneyGate
    startup_probe_timeout_seconds: 300
    screenshot_dir_name: screenshots
    maestro_debug_dir_name: maestro-debug
    logcat_file_name: logcat.txt
    summary_file_name: journey-summary.md
    report_file_name: journey-report.json
