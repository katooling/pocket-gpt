name: Nightly Validation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-emulator-instrumented:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run nightly instrumentation smoke matrix
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: ./gradlew --no-daemon :apps:mobile-android:connectedDebugAndroidTest

      - name: Upload nightly instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-instrumented-reports-api-${{ matrix.api-level }}
          path: |
            **/build/outputs/androidTest-results/**
            **/build/reports/androidTests/**
          if-no-files-found: warn

  nightly-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Run Maestro nightly smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: python3 tools/devctl/main.py lane maestro

      - name: Upload nightly Maestro smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-maestro-smoke-api-${{ matrix.api-level }}
          path: |
            scripts/benchmarks/runs/**/maestro/**
          if-no-files-found: warn

  nightly-maestro-first-run:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        api-level: [33, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Assemble debug APK
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleDebug

      - name: Run first-run lifecycle flow on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: |
            set -euo pipefail
            FLOW_PATH="tests/maestro/scenario-first-run-download-chat.yaml"
            OUT_DIR="tmp/nightly-maestro-first-run/api-${{ matrix.api-level }}"
            mkdir -p "${OUT_DIR}"

            APK_PATH="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
            if [[ -z "${APK_PATH}" ]]; then
              echo "No debug APK found under apps/mobile-android/build/outputs/apk/debug" >&2
              exit 1
            fi

            DEVICE_SERIAL="$(adb devices | awk 'NR>1 && $2==\"device\" {print $1; exit}')"
            if [[ -z "${DEVICE_SERIAL}" ]]; then
              echo "No connected emulator/device for Maestro run." >&2
              exit 1
            fi

            adb -s "${DEVICE_SERIAL}" install -r "${APK_PATH}" >/dev/null
            maestro --device "${DEVICE_SERIAL}" test "${FLOW_PATH}" --format junit --debug-output "${OUT_DIR}/debug" \
              > "${OUT_DIR}/junit.xml" \
              2> "${OUT_DIR}/maestro-stderr.log"

      - name: Upload nightly Maestro first-run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-maestro-first-run-api-${{ matrix.api-level }}
          path: |
            tmp/nightly-maestro-first-run/api-${{ matrix.api-level }}/**
          if-no-files-found: warn

  nightly-maestro-cloud-first-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    env:
      MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Skip when Maestro Cloud key is missing
        run: |
          if [[ -z "${MAESTRO_CLOUD_API_KEY}" ]]; then
            echo "MAESTRO_CLOUD_API_KEY is not configured; skipping cloud supplemental nightly flow."
            exit 0
          fi

      - name: Assemble debug APK
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleDebug

      - name: Run first-run lifecycle flow on Maestro Cloud
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: |
          set -euo pipefail
          mkdir -p tmp/nightly-maestro-cloud-first-run
          APK_PATH="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "No debug APK found under apps/mobile-android/build/outputs/apk/debug" >&2
            exit 1
          fi
          maestro cloud --android-api-level 34 \
            --device-locale en_US \
            --app-file "${APK_PATH}" \
            --flows tests/maestro/scenario-first-run-download-chat.yaml \
            --format junit \
            --output tmp/nightly-maestro-cloud-first-run/junit.xml

      - name: Run model-management split smoke on Maestro Cloud
        if: env.MAESTRO_CLOUD_API_KEY != ''
        run: |
          set -euo pipefail
          mkdir -p tmp/nightly-maestro-cloud-model-management
          APK_PATH="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${APK_PATH}" ]]; then
            echo "No debug APK found under apps/mobile-android/build/outputs/apk/debug" >&2
            exit 1
          fi
          maestro cloud --android-api-level 34 \
            --device-locale en_US \
            --app-file "${APK_PATH}" \
            --flows tests/maestro-cloud/ \
            --include-tags cloud-smoke \
            --format junit \
            --output tmp/nightly-maestro-cloud-model-management/junit.xml

      - name: Upload nightly Maestro cloud artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-maestro-cloud-first-run
          path: |
            tmp/nightly-maestro-cloud-first-run/**
            tmp/nightly-maestro-cloud-model-management/**
          if-no-files-found: warn
