name: Nightly Validation

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-emulator-instrumented:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        api-level: [30, 34]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run nightly instrumentation smoke matrix
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew --no-daemon :apps:mobile-android:connectedDebugAndroidTest

      - name: Upload nightly instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-instrumented-reports-api-${{ matrix.api-level }}
          path: |
            **/build/outputs/androidTest-results/**
            **/build/reports/androidTests/**
          if-no-files-found: warn

  nightly-maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Run Maestro nightly smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: python3 tools/devctl/main.py lane maestro

