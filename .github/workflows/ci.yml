name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci_tests: ${{ steps.filter.outputs.ci_tests }}
      android_runtime: ${{ steps.filter.outputs.android_runtime }}
      android_instrumented: ${{ steps.filter.outputs.android_instrumented }}
      lifecycle_high_risk_paths: ${{ steps.filter.outputs.lifecycle_high_risk_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci_tests:
              - "apps/**"
              - "packages/**"
              - "tools/**"
              - "scripts/**"
              - "config/**"
              - "settings.gradle.kts"
              - "build.gradle.kts"
              - "**/*.gradle"
              - "**/*.gradle.kts"
              - ".github/workflows/ci.yml"
            android_runtime:
              - "apps/mobile-android/**"
              - "packages/**"
              - "tools/devctl/**"
              - "scripts/android/**"
              - "scripts/benchmarks/**"
              - "config/devctl/**"
              - "third_party/llama.cpp/**"
            android_instrumented:
              - "apps/mobile-android/**"
              - "packages/**"
              - "tools/devctl/**"
              - "config/devctl/**"
            lifecycle_high_risk_paths:
              - "apps/mobile-android/src/main/kotlin/com/pocketagent/android/runtime/**"
              - "apps/mobile-android/src/main/kotlin/com/pocketagent/android/ui/**"
              - "packages/app-runtime/**"
              - "packages/native-bridge/**"
              - "tests/maestro/scenario-first-run-download-chat.yaml"
              - ".github/workflows/ci.yml"

  lifecycle-risk:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Classify lifecycle E2E risk
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          PATH_RISK: ${{ needs.changes.outputs.lifecycle_high_risk_paths }}
        run: |
          set -euo pipefail
          should_run=false
          label_risk=false
          reasons=()
          event_json_path="${GITHUB_EVENT_PATH:-}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ -n "${event_json_path}" && -f "${event_json_path}" ]]; then
              if jq -e '.pull_request.labels[]?.name | select(. == "risk:e2e-lifecycle" or . == "risk:runtime" or . == "risk:provisioning")' "${event_json_path}" >/dev/null; then
                label_risk=true
              fi
            else
              echo "::warning::GITHUB_EVENT_PATH is unavailable; skipping label risk detection."
            fi
          fi

          if [[ "${EVENT_NAME}" == "push" && "${REF_NAME}" == "main" ]]; then
            should_run=true
            reasons+=("main-push")
          fi

          if [[ "${PATH_RISK}" == "true" ]]; then
            should_run=true
            reasons+=("high-risk-path")
          fi

          if [[ "${label_risk}" == "true" ]]; then
            should_run=true
            reasons+=("risk-label")
          fi

          if [[ ${#reasons[@]} -eq 0 ]]; then
            reasons+=("low-risk-change")
          fi

          reason="$(IFS=,; echo "${reasons[*]}")"
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
          echo "Lifecycle E2E gate decision: should_run=${should_run} reason=${reason}"

  pr-governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Validate PR template completion
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr-body.md
          python3 tools/devctl/main.py governance validate-pr-body /tmp/pr-body.md

      - name: Stage-close evidence gate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr-body.md
          python3 tools/devctl/main.py governance stage-close-gate /tmp/pr-body.md

      - name: Validate changed evidence references
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python3 tools/devctl/main.py governance evidence-check-changed --event-name "$GITHUB_EVENT_NAME" --base-ref "$GITHUB_BASE_REF"

  docs-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Docs drift guard
        run: python3 tools/devctl/main.py governance docs-drift

      - name: Docs health guard
        run: python3 tools/devctl/main.py governance docs-health

      - name: Docs accuracy guard
        run: python3 tools/devctl/main.py governance docs-accuracy

      - name: Governance self-tests
        run: python3 tools/devctl/main.py governance self-test

  unit-and-host-tests:
    needs: changes
    if: needs.changes.outputs.ci_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK env
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

      - name: Test (devctl canonical lane)
        run: python3 tools/devctl/main.py lane test ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn

  android-lint:
    needs: changes
    if: needs.changes.outputs.android_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Android lint
        run: ./gradlew --no-daemon :apps:mobile-android:lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
          if-no-files-found: warn

  native-build-package-check:
    needs: changes
    if: needs.changes.outputs.android_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble debug APK with native build enabled
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleDebug

      - name: Verify packaged native library
        run: |
          set -euo pipefail
          apk_path="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "No debug APK produced under apps/mobile-android/build/outputs/apk/debug" >&2
            exit 1
          fi
          echo "Inspecting APK: ${apk_path}"
          if ! unzip -l "${apk_path}" | grep -q 'lib/arm64-v8a/libpocket_llama.so'; then
            echo "Missing lib/arm64-v8a/libpocket_llama.so in ${apk_path}" >&2
            exit 1
          fi

  android-instrumented-smoke:
    needs: changes
    if: needs.changes.outputs.android_instrumented == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation smoke on emulator (attempt 1)
        id: instrumented_attempt_1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 1800
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false -Pandroid.testInstrumentationRunnerArguments.class=com.pocketagent.android.MainActivityUiSmokeTest#onboardingFlowCanProgressAndComplete :apps:mobile-android:connectedDebugAndroidTest

      - name: Run instrumentation smoke on emulator (attempt 2)
        id: instrumented_attempt_2
        if: steps.instrumented_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 1800
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false -Pandroid.testInstrumentationRunnerArguments.class=com.pocketagent.android.MainActivityUiSmokeTest#onboardingFlowCanProgressAndComplete :apps:mobile-android:connectedDebugAndroidTest

      - name: Enforce instrumentation success after bounded retry
        if: always()
        run: |
          set -euo pipefail
          first="${{ steps.instrumented_attempt_1.outcome }}"
          second="${{ steps.instrumented_attempt_2.outcome || 'skipped' }}"
          if [[ "${first}" == "success" || "${second}" == "success" ]]; then
            echo "Instrumentation smoke passed (first=${first}, second=${second})."
            exit 0
          fi
          echo "::error::Instrumentation smoke failed after bounded retry (first=${first}, second=${second})."
          exit 1

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-smoke-reports
          path: |
            **/build/outputs/androidTest-results/**
            **/build/reports/androidTests/**
          if-no-files-found: warn

  lifecycle-e2e-first-run:
    name: lifecycle-e2e-first-run
    needs:
      - lifecycle-risk
    if: needs.lifecycle-risk.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm",GROUP="kvm",MODE="0666",OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Assemble debug APK
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=false :apps:mobile-android:assembleDebug

      - name: Run first-run lifecycle E2E with bounded retry (attempt 1)
        id: lifecycle_attempt_1
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 1800
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: bash scripts/ci/run_lifecycle_e2e.sh "${{ needs.lifecycle-risk.outputs.reason }}"

      - name: Run first-run lifecycle E2E with bounded retry (attempt 2)
        id: lifecycle_attempt_2
        if: steps.lifecycle_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          target: google_apis
          emulator-boot-timeout: 1800
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-load -no-snapshot-save
          disable-animations: true
          script: bash scripts/ci/run_lifecycle_e2e.sh "${{ needs.lifecycle-risk.outputs.reason }}"

      - name: Enforce lifecycle E2E success after bounded retry
        if: always()
        run: |
          set -euo pipefail
          first="${{ steps.lifecycle_attempt_1.outcome }}"
          second="${{ steps.lifecycle_attempt_2.outcome || 'skipped' }}"
          if [[ "${first}" == "success" || "${second}" == "success" ]]; then
            echo "Lifecycle E2E passed (first=${first}, second=${second})."
            exit 0
          fi
          echo "::error::Lifecycle E2E failed after bounded retry (first=${first}, second=${second})."
          exit 1

      - name: Upload lifecycle E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-e2e-first-run-artifacts
          path: |
            tmp/lifecycle-e2e-first-run/**
          if-no-files-found: warn
