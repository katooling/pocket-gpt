name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      ci_tests: ${{ steps.filter.outputs.ci_tests }}
      android_runtime: ${{ steps.filter.outputs.android_runtime }}
      android_instrumented: ${{ steps.filter.outputs.android_instrumented }}
      lifecycle_high_risk_paths: ${{ steps.filter.outputs.lifecycle_high_risk_paths }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ci_tests:
              - "apps/**"
              - "packages/**"
              - "tools/**"
              - "scripts/**"
              - "config/**"
              - "settings.gradle.kts"
              - "build.gradle.kts"
              - "**/*.gradle"
              - "**/*.gradle.kts"
              - ".github/workflows/ci.yml"
            android_runtime:
              - "apps/mobile-android/**"
              - "packages/**"
              - "tools/devctl/**"
              - "scripts/android/**"
              - "scripts/benchmarks/**"
              - "config/devctl/**"
              - "third_party/llama.cpp/**"
            android_instrumented:
              - "apps/mobile-android/**"
              - "packages/**"
              - "tools/devctl/**"
              - "config/devctl/**"
            lifecycle_high_risk_paths:
              - "apps/mobile-android/src/main/kotlin/com/pocketagent/android/runtime/**"
              - "apps/mobile-android/src/main/kotlin/com/pocketagent/android/ui/**"
              - "packages/app-runtime/**"
              - "packages/native-bridge/**"
              - "tests/maestro/scenario-first-run-download-chat.yaml"
              - ".github/workflows/ci.yml"

  lifecycle-risk:
    needs: changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.classify.outputs.should_run }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - name: Classify lifecycle E2E risk
        id: classify
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          PATH_RISK: ${{ needs.changes.outputs.lifecycle_high_risk_paths }}
        run: |
          set -euo pipefail
          should_run=false
          label_risk=false
          reasons=()
          event_json_path="${GITHUB_EVENT_PATH:-}"

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            if [[ -n "${event_json_path}" && -f "${event_json_path}" ]]; then
              if jq -e '.pull_request.labels[]?.name | select(. == "risk:e2e-lifecycle" or . == "risk:runtime" or . == "risk:provisioning")' "${event_json_path}" >/dev/null; then
                label_risk=true
              fi
            else
              echo "::warning::GITHUB_EVENT_PATH is unavailable; skipping label risk detection."
            fi
          fi

          if [[ "${EVENT_NAME}" == "push" && "${REF_NAME}" == "main" ]]; then
            should_run=true
            reasons+=("main-push")
          fi

          if [[ "${PATH_RISK}" == "true" ]]; then
            should_run=true
            reasons+=("high-risk-path")
          fi

          if [[ "${label_risk}" == "true" ]]; then
            should_run=true
            reasons+=("risk-label")
          fi

          if [[ ${#reasons[@]} -eq 0 ]]; then
            reasons+=("low-risk-change")
          fi

          reason="$(IFS=,; echo "${reasons[*]}")"
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"
          echo "Lifecycle E2E gate decision: should_run=${should_run} reason=${reason}"

  pr-governance:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Validate PR template completion
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr-body.md
          python3 tools/devctl/main.py governance validate-pr-body /tmp/pr-body.md

      - name: Stage-close evidence gate
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          printf "%s" "$PR_BODY" > /tmp/pr-body.md
          python3 tools/devctl/main.py governance stage-close-gate /tmp/pr-body.md

      - name: Validate changed evidence references
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: python3 tools/devctl/main.py governance evidence-check-changed --event-name "$GITHUB_EVENT_NAME" --base-ref "$GITHUB_BASE_REF"

  docs-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Docs drift guard
        run: python3 tools/devctl/main.py governance docs-drift

      - name: Docs health guard
        run: python3 tools/devctl/main.py governance docs-health

      - name: Docs accuracy guard
        run: python3 tools/devctl/main.py governance docs-accuracy

      - name: Governance self-tests
        run: python3 tools/devctl/main.py governance self-test

  unit-and-host-tests:
    needs: changes
    if: needs.changes.outputs.ci_tests == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install devctl Python deps
        run: python3 -m pip install -r tools/devctl/requirements.txt

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Android SDK env
        run: |
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

      - name: Test (devctl canonical lane)
        run: python3 tools/devctl/main.py lane test ci

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          if-no-files-found: warn

  android-lint:
    needs: changes
    if: needs.changes.outputs.android_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Android lint
        run: ./gradlew --no-daemon :apps:mobile-android:lintDebug

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: |
            **/build/reports/lint-results*.html
            **/build/reports/lint-results*.xml
          if-no-files-found: warn

  native-build-package-check:
    needs: changes
    if: needs.changes.outputs.android_runtime == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble debug APK with native build enabled
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleDebug

      - name: Verify packaged native library
        run: |
          set -euo pipefail
          apk_path="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "No debug APK produced under apps/mobile-android/build/outputs/apk/debug" >&2
            exit 1
          fi
          echo "Inspecting APK: ${apk_path}"
          if ! unzip -l "${apk_path}" | grep -q 'lib/arm64-v8a/libpocket_llama.so'; then
            echo "Missing lib/arm64-v8a/libpocket_llama.so in ${apk_path}" >&2
            exit 1
          fi

  android-instrumented-smoke:
    needs: changes
    if: needs.changes.outputs.android_instrumented == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Run instrumentation smoke on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew --no-daemon :apps:mobile-android:connectedDebugAndroidTest

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-instrumented-smoke-reports
          path: |
            **/build/outputs/androidTest-results/**
            **/build/reports/androidTests/**
          if-no-files-found: warn

  lifecycle-e2e-first-run:
    name: lifecycle-e2e-first-run
    needs:
      - lifecycle-risk
    if: needs.lifecycle-risk.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "${HOME}/.maestro/bin" >> "${GITHUB_PATH}"

      - name: Assemble debug APK
        run: ./gradlew --no-daemon -Ppocketgpt.enableNativeBuild=true :apps:mobile-android:assembleDebug

      - name: Run first-run lifecycle E2E with bounded retry
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -euo pipefail
            FLOW_PATH="tests/maestro/scenario-first-run-download-chat.yaml"
            OUT_DIR="tmp/lifecycle-e2e-first-run"
            APP_ID="com.pocketagent.android"
            APP_TEST_ID="com.pocketagent.android.test"

            mkdir -p "${OUT_DIR}"
            APK_PATH="$(find apps/mobile-android/build/outputs/apk/debug -type f -name '*.apk' | sort | head -n 1)"
            if [[ -z "${APK_PATH}" ]]; then
              echo "No debug APK found under apps/mobile-android/build/outputs/apk/debug" >&2
              exit 1
            fi

            DEVICE_SERIAL="$(adb devices | awk 'NR>1 && $2==\"device\" {print $1; exit}')"
            if [[ -z "${DEVICE_SERIAL}" ]]; then
              echo "No connected emulator/device for Maestro run." >&2
              exit 1
            fi

            adb -s "${DEVICE_SERIAL}" install -r "${APK_PATH}" >/dev/null

            run_attempt() {
              local attempt="$1"
              local attempt_dir="${OUT_DIR}/attempt-${attempt}"
              mkdir -p "${attempt_dir}"
              set +e
              maestro --device "${DEVICE_SERIAL}" test "${FLOW_PATH}" --format junit --debug-output "${attempt_dir}/debug" \
                > "${attempt_dir}/junit.xml" \
                2> "${attempt_dir}/maestro-stderr.log"
              local rc=$?
              set -e
              return ${rc}
            }

            if run_attempt 1; then
              printf "decision=%s\nreason=%s\nfirst_attempt_failed=%s\nfinal_attempt=%s\n" \
                "run" "${{ needs.lifecycle-risk.outputs.reason }}" "false" "1" > "${OUT_DIR}/retry-summary.txt"
              exit 0
            fi

            echo "::warning::First lifecycle E2E attempt failed; retrying once after clean-state reset."
            printf "decision=%s\nreason=%s\nfirst_attempt_failed=%s\n" \
              "run" "${{ needs.lifecycle-risk.outputs.reason }}" "true" > "${OUT_DIR}/retry-summary.txt"

            adb -s "${DEVICE_SERIAL}" shell pm clear "${APP_ID}" >/dev/null || true
            adb -s "${DEVICE_SERIAL}" uninstall "${APP_ID}" >/dev/null || true
            adb -s "${DEVICE_SERIAL}" uninstall "${APP_TEST_ID}" >/dev/null || true
            adb -s "${DEVICE_SERIAL}" install -r "${APK_PATH}" >/dev/null

            if run_attempt 2; then
              echo "final_attempt=2" >> "${OUT_DIR}/retry-summary.txt"
              exit 0
            fi

            echo "final_attempt=none" >> "${OUT_DIR}/retry-summary.txt"
            exit 1

      - name: Upload lifecycle E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-e2e-first-run-artifacts
          path: |
            tmp/lifecycle-e2e-first-run/**
          if-no-files-found: warn
