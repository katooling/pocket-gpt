appId: com.pocketagent.android
---
- launchApp
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn: "Skip"
- assertVisible: "Offline-first"
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
- takeScreenshot: "scenario-a-01-ready"
- tapOn: "Message"
- eraseText
- inputText: "Hello from Maestro scenario A"
- takeScreenshot: "scenario-a-02-typed"
- tapOn: "Send"
- assertVisible: "Hello from Maestro scenario A"
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-a-03-sent"
