appId: com.pocketagent.android
---
- launchApp:
    clearState: false
- assertNotVisible: "Welcome to Pocket GPT"
- runFlow:
    when:
      visible: "Refresh runtime checks"
    commands:
      - tapOn: "Refresh runtime checks"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertNotVisible: "UI-STARTUP-001"
- takeScreenshot: "ui-04-chat-ready-empty-maestro"
- tapOn: "Message"
- eraseText
- inputText: "Reply with exactly: CORE_A_OK"
- takeScreenshot: "scenario-a-02-typed"
- tapOn: "Send"
- assertVisible: "Reply with exactly: CORE_A_OK"
- extendedWaitUntil:
    visible: "CORE_A_OK"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "ui-05-chat-post-send-maestro"
