appId: com.pocketagent.android
---
- launchApp:
    clearState: false
- tapOn:
    text: "Skip"
    optional: true
    waitUntilVisible: true
- runFlow:
    when:
      visible: "Refresh runtime checks"
    commands:
      - tapOn: "Refresh runtime checks"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertNotVisible: "UI-STARTUP-001"
- takeScreenshot: "ui-15-image-entry-visible-maestro"
- assertVisible: "Attach image"
- tapOn: "Message"
- eraseText
- inputText: "Reply with exactly: CORE_C_OK"
- tapOn: "Send"
- assertVisible: "Reply with exactly: CORE_C_OK"
- extendedWaitUntil:
    visible: "CORE_C_OK"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-c-02-first-turn"
- takeScreenshot: "scenario-c-03-follow-up"
