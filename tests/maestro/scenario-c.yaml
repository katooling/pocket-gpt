appId: com.pocketagent.android
---
- launchApp
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn: "Skip"
- assertVisible: "Offline-first"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertVisible: "Runtime: Ready"
- assertNotVisible: "UI-RUNTIME-001"
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
      - extendedWaitUntil:
          visible: "Runtime: Ready"
          timeout: 300000
- takeScreenshot: "scenario-c-01-ready"
- tapOn: "Message"
- eraseText
- inputText: "Remember this launch risk list for scenario C."
- tapOn: "Send"
- assertVisible: "Remember this launch risk list for scenario C."
- extendedWaitUntil:
    visible: "Runtime: (Ready|Error)"
    timeout: 180000
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
      - extendedWaitUntil:
          visible: "Runtime: Ready"
          timeout: 300000
- assertVisible: "Runtime: Ready"
- assertNotVisible: "Runtime: Error"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-c-02-first-turn"
- tapOn: "Message"
- eraseText
- inputText: "What did I ask you to remember earlier?"
- tapOn: "Send"
- extendedWaitUntil:
    visible: "Runtime: (Ready|Error)"
    timeout: 180000
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
      - extendedWaitUntil:
          visible: "Runtime: Ready"
          timeout: 300000
- assertVisible: "Runtime: Ready"
- assertNotVisible: "Runtime: Error"
- assertVisible: "Remember this launch risk list for scenario C."
- assertVisible: "Attach image"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-c-03-follow-up"
