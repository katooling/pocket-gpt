appId: com.pocketagent.android
tags:
  - smoke
  - sessions
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn:
          id: "onboarding_next"
      - extendedWaitUntil:
          visible: "Step 2 of 3"
          timeout: 20000
      - tapOn:
          id: "onboarding_next"
      - extendedWaitUntil:
          visible: "Step 3 of 3"
          timeout: 20000
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
- tapOn:
    id: "session_drawer_button"
- assertVisible: "Create session"
- assertVisible: "New chat"
- tapOn: "Delete session New chat"
- assertVisible: "Delete conversation?"
- tapOn: "Delete"
- assertVisible: "Create session"
- assertVisible: "New chat"
- takeScreenshot: "scenario-session-drawer-after-delete"
