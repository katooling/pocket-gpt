appId: com.pocketagent.android
tags:
  - smoke
  - onboarding
  - bootstrap
  - maestro-default
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn:
          id: "onboarding_next"
      - extendedWaitUntil:
          visible: "Step 2 of 3"
          timeout: 20000
      - tapOn:
          id: "onboarding_next"
      - extendedWaitUntil:
          visible: "Step 3 of 3"
          timeout: 20000
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
- runFlow:
    when:
      visible: "Refresh"
    commands:
      - tapOn:
          id: "refresh_button"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertNotVisible: "Welcome to Pocket GPT"
- assertNotVisible: "UI-STARTUP-001"
- takeScreenshot: "scenario-onboarding-ready"
