appId: com.pocketagent.android
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn: "Next"
      - extendedWaitUntil:
          visible: "Step 2 of 3"
          timeout: 20000
      - tapOn: "Next"
      - extendedWaitUntil:
          visible: "Step 3 of 3"
          timeout: 20000
      - tapOn: "Get started"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
- runFlow:
    when:
      visible: "Refresh runtime checks"
    commands:
      - tapOn: "Refresh runtime checks"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertNotVisible: "Welcome to Pocket GPT"
- assertNotVisible: "UI-STARTUP-001"
- takeScreenshot: "scenario-onboarding-ready"
