appId: com.pocketagent.android
---
- runFlow:
    when:
      visible:
        id: "open_model_library"
    commands:
      - tapOn:
          id: "open_model_library"
- runFlow:
    when:
      visible: "More models…"
    commands:
      - tapOn: "More models…"
- runFlow:
    when:
      visible: "Open model library"
    commands:
      - tapOn: "Open model library"
- runFlow:
    when:
      visible: "Fix model library"
    commands:
      - tapOn: "Fix model library"
- runFlow:
    when:
      notVisible: "Model library"
    commands:
      - runFlow:
          when:
            visible:
              id: "advanced_sheet_button"
          commands:
            - tapOn:
                id: "advanced_sheet_button"
      - runFlow:
          when:
            visible: "Advanced"
          commands:
            - tapOn: "Advanced"
      - runFlow:
          when:
            visible: "Open model library"
          commands:
            - tapOn: "Open model library"
      - runFlow:
          when:
            visible: "Fix model library"
          commands:
            - tapOn: "Fix model library"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
