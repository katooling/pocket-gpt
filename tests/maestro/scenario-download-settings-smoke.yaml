appId: com.pocketagent.android
tags:
  - smoke
  - model-management
  - downloads
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn:
          id: "onboarding_next"
      - extendedWaitUntil:
          visible: "Step 2 of 3"
          timeout: 20000
      - tapOn:
          id: "onboarding_next"
      - extendedWaitUntil:
          visible: "Step 3 of 3"
          timeout: 20000
      - tapOn:
          id: "onboarding_get_started"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- assertVisible: "Offline-first"
- tapOn: "Advanced"
- extendedWaitUntil:
    visible: "Advanced controls"
    timeout: 20000
- assertVisible: "Downloads"
- assertVisible: "Wi-Fi only for large downloads"
- tapOn: "Wi-Fi only for large downloads"
- tapOn: "Wi-Fi only for large downloads"
- takeScreenshot: "download-settings-smoke"
- scrollUntilVisible:
    element:
      text: "Open model library"
    direction: DOWN
    timeout: 20000
- assertVisible: "Open runtime controls"
- tapOn: "Open model library"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
- assertVisible: "Refresh all"
- assertVisible: "Downloads"
- assertNotVisible: "Load now"
- assertNotVisible: "Offload"
- scrollUntilVisible:
    element:
      text: "Open runtime controls"
    direction: DOWN
    timeout: 20000
- tapOn: "Open runtime controls"
- extendedWaitUntil:
    visible: "Runtime model"
    timeout: 30000
- assertVisible: "Runtime load state"
- assertVisible: "No installed models yet"
- assertNotVisible: "Downloads"
- assertNotVisible: "Start download"
- tapOn: "Open model library"
- extendedWaitUntil:
    visible: "Model library"
    timeout: 30000
