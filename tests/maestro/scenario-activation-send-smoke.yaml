appId: com.pocketagent.android
tags:
  - recovery
  - model-management
  - maestro-default
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- assertNotVisible: "UI-STARTUP-001"
- tapOn:
    id: "session_drawer_button"
- extendedWaitUntil:
    visible:
      id: "create_session_button"
    timeout: 10000
- tapOn:
    id: "create_session_button"
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "Reply with exactly: ACTIVATION_SMOKE_OK"
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 180000
- extendedWaitUntil:
    visible:
      id: "send_button"
      enabled: true
    timeout: 180000
- tapOn:
    id: "send_button"
- runFlow:
    when:
      visible: "Loading…"
    commands:
      - extendedWaitUntil:
          notVisible: "Loading…"
          timeout: 180000
      - extendedWaitUntil:
          visible:
            id: "send_button"
            enabled: true
          timeout: 180000
      - tapOn:
          id: "send_button"
- assertVisible: "Reply with exactly: ACTIVATION_SMOKE_OK"
- extendedWaitUntil:
    visible: "ACTIVATION_SMOKE_OK"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "activation-send-smoke"
