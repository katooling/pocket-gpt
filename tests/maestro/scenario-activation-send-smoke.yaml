appId: com.pocketagent.android
---
- launchApp
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn: "Skip"
- assertVisible: "Offline-first"
- assertNotVisible: "UI-RUNTIME-001"
- tapOn: "Advanced"
- tapOn: "Open model setup"
- assertVisible: "Model provisioning"
- assertVisible: "Downloads"
- assertNotVisible: "Downloads are disabled in this build. Use local import for now."
- takeScreenshot: "activation-send-smoke-model-sheet"
- scrollUntilVisible:
    element:
      text: "Set active"
    direction: DOWN
    timeout: 20000
    optional: true
- runFlow:
    when:
      notVisible: "Set active"
    commands:
      - takeScreenshot: "activation-send-smoke-no-candidate"
- runFlow:
    when:
      visible: "Set active"
    commands:
      - tapOn: "Set active"
      - takeScreenshot: "activation-send-smoke-activated"
- back
- tapOn: "Open model setup"
- assertVisible: "Model provisioning"
- assertVisible: "Downloads"
- takeScreenshot: "activation-send-smoke-reopened"
- back
- runFlow:
    when:
      visible: "Advanced controls"
    commands:
      - back
- tapOn: "Message"
- eraseText
- inputText: "ola how you doin"
- tapOn: "Send"
- assertVisible: "ola how you doin"
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "activation-send-smoke"
