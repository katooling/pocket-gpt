appId: com.pocketagent.android
---
- launchApp:
    clearState: false
- tapOn:
    text: "Skip"
    optional: true
    waitUntilVisible: true
- runFlow:
    when:
      visible: "Refresh runtime checks"
    commands:
      - tapOn: "Refresh runtime checks"
- tapOn: "Advanced"
- assertVisible: "Advanced controls"
- tapOn: "Open model setup"
- assertVisible: "Model provisioning"
- assertVisible: "Required models"
- scrollUntilVisible:
    element:
      text: "Downloads"
    direction: DOWN
    timeout: 20000
- takeScreenshot: "activation-send-smoke-model-sheet"
- back
- runFlow:
    when:
      visible: "Advanced controls"
    commands:
      - back
- runFlow:
    when:
      visible: "Refresh runtime checks"
    commands:
      - tapOn: "Refresh runtime checks"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertNotVisible: "UI-STARTUP-001"
- tapOn: "Message"
- eraseText
- inputText: "Reply with exactly: ACTIVATION_SMOKE_OK"
- tapOn: "Send"
- assertVisible: "Reply with exactly: ACTIVATION_SMOKE_OK"
- extendedWaitUntil:
    visible: "ACTIVATION_SMOKE_OK"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "activation-send-smoke"
