appId: com.pocketagent.android
tags:
  - lifecycle
  - gpu
  - long-running
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible: "Get started"
    commands:
      - tapOn:
          id: "onboarding_get_started"
- assertVisible: "Offline-first"
- runFlow:
    when:
      visible: "Load last used"
    commands:
      - tapOn: "Load last used"
- runFlow:
    when:
      visible: "Setup"
    commands:
      - runFlow:
          when:
            visible: "Get ready"
          commands:
            - tapOn: "Get ready"
      - runFlow:
          when:
            visible: "Load last used"
          commands:
            - tapOn: "Load last used"
      - runFlow:
          when:
            visible: "Setup"
          commands:
            - tapOn:
                id: "send_button"
      - runFlow:
          when:
            visible: "Load last used"
          commands:
            - tapOn: "Load last used"
      - runFlow:
          when:
            visible: "Setup"
          commands:
            - runFlow: shared/open-model-library.yaml
      - runFlow:
          when:
            visible: "Download default model"
          commands:
            - tapOn: "Download default model"
      - runFlow:
          when:
            visible: "Download"
          commands:
            - tapOn: "Download"
      - runFlow:
          when:
            visible: "Pause"
          commands:
            - extendedWaitUntil:
                notVisible: "Pause"
                timeout: 900000
      - runFlow:
          when:
            visible: "Model library"
          commands:
            - back
- runFlow:
    when:
      visible: "Refresh"
    commands:
      - tapOn:
          id: "refresh_button"
- extendedWaitUntil:
    notVisible: "Setup"
    timeout: 900000
- extendedWaitUntil:
    notVisible: "Loading…"
    timeout: 900000
- extendedWaitUntil:
    visible: "Send"
    timeout: 60000
- assertNotVisible: "UI-STARTUP-001"
- runFlow: shared/open-advanced-controls.yaml
- runFlow:
    when:
      visible: "Enable GPU acceleration"
    commands:
      - tapOn: "Enable GPU acceleration"
- runFlow:
    when:
      visible: "GPU acceleration unavailable on this build/device"
    commands:
      - assertVisible: "GPU acceleration unavailable on this build/device"
- runFlow:
    when:
      visible: "GPU acceleration unavailable ("
    commands:
      - assertVisible: "GPU acceleration unavailable ("
- back
- extendedWaitUntil:
    visible: "Send"
    timeout: 60000
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "gpu flow smoke"
- tapOn:
    id: "send_button"
- assertVisible: "gpu flow smoke"
- extendedWaitUntil:
    notVisible: "Cancel"
    timeout: 600000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "first-run-gpu-chat-smoke"
