appId: com.pocketagent.android
tags:
  - lifecycle
  - gpu
  - long-running
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn:
          id: "onboarding_skip"
- runFlow:
    when:
      visible: "Get started"
    commands:
      - tapOn:
          id: "onboarding_get_started"
- assertVisible: "Offline-first"
- runFlow:
    when:
      notVisible: "Runtime: Ready"
    commands:
      - runFlow:
          when:
            visible: "Get ready"
          commands:
            - tapOn: "Get ready"
      - runFlow:
          when:
            visible: "Open model library"
          commands:
            - tapOn: "Open model library"
      - runFlow:
          when:
            visible: "Fix model library"
          commands:
            - tapOn: "Fix model library"
      - runFlow:
          when:
            notVisible: "Model library"
          commands:
            - runFlow:
                when:
                  visible:
                    id: "advanced_sheet_button"
                commands:
                  - tapOn:
                      id: "advanced_sheet_button"
            - runFlow:
                when:
                  visible: "Advanced"
                commands:
                  - tapOn: "Advanced"
            - runFlow:
                when:
                  visible: "Open model library"
                commands:
                  - tapOn: "Open model library"
            - runFlow:
                when:
                  visible: "Fix model library"
                commands:
                  - tapOn: "Fix model library"
      - extendedWaitUntil:
          visible: "Model library"
          timeout: 30000
      - runFlow:
          when:
            visible: "Download default model"
          commands:
            - tapOn: "Download default model"
      - runFlow:
          when:
            visible: "Start download"
          commands:
            - tapOn: "Start download"
            - extendedWaitUntil:
                visible: "Pause"
                timeout: 120000
      - runFlow:
          when:
            visible: "Model library"
          commands:
            - back
      - runFlow:
          when:
            visible: "Runtime: Error"
          commands:
            - tapOn: "Refresh"
      - extendedWaitUntil:
          visible: "Runtime: Ready"
          timeout: 900000
- assertNotVisible: "Runtime: Error"
- tapOn: "Advanced"
- assertVisible: "Advanced controls"
- runFlow:
    when:
      visible: "Enable GPU acceleration"
    commands:
      - tapOn: "Enable GPU acceleration"
- runFlow:
    when:
      visible: "GPU acceleration unavailable on this build/device"
    commands:
      - assertVisible: "GPU acceleration unavailable on this build/device"
- runFlow:
    when:
      visible: "GPU acceleration unavailable ("
    commands:
      - assertVisible: "GPU acceleration unavailable ("
- back
- tapOn:
    id: "composer_input"
- eraseText
- inputText: "gpu flow smoke"
- tapOn:
    id: "send_button"
- assertVisible: "gpu flow smoke"
- extendedWaitUntil:
    notVisible: "Cancel"
    timeout: 600000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "first-run-gpu-chat-smoke"
