appId: com.pocketagent.android
---
- launchApp:
    clearState: false
- assertNotVisible: "Welcome to Pocket GPT"
- runFlow:
    when:
      visible: "Refresh runtime checks"
    commands:
      - tapOn: "Refresh runtime checks"
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- assertNotVisible: "UI-STARTUP-001"
- takeScreenshot: "scenario-b-01-ready"
- tapOn: "Advanced"
- assertVisible: "Advanced controls"
- assertVisible: "Downloads"
- assertVisible: "Wi-Fi only for large downloads"
- tapOn: "Wi-Fi only for large downloads"
- tapOn: "Wi-Fi only for large downloads"
- tapOn: "QWEN_2B"
- back
- extendedWaitUntil:
    visible: "Runtime: Ready"
    timeout: 180000
- takeScreenshot: "scenario-b-03-after-diagnostics"
- tapOn: "Message"
- eraseText
- inputText: "Reply with exactly: CORE_B_OK"
- tapOn: "Send"
- assertVisible: "Reply with exactly: CORE_B_OK"
- extendedWaitUntil:
    visible: "CORE_B_OK"
    timeout: 180000
- extendedWaitUntil:
    visible: "Send"
    timeout: 180000
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-b-04-after-switch-send"
