appId: com.pocketagent.android
---
- launchApp
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn: "Skip"
- assertVisible: "Offline-first"
- takeScreenshot: "scenario-b-01-ready"
- tapOn: "Message"
- eraseText
- inputText: "Simple-first unlock step one"
- tapOn: "Send"
- assertVisible: "Simple-first unlock step one"
- extendedWaitUntil:
    notVisible: "Cancel"
    timeout: 120000
- tapOn: "Message"
- eraseText
- inputText: "Simple-first unlock step two"
- tapOn: "Send"
- assertVisible: "Simple-first unlock step two"
- assertVisible: "Advanced"
- tapOn: "Tools"
- tapOn: "calculate 4*9"
- tapOn: "Send"
- assertVisible: "Tool: calculator"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-b-02-tool"
- tapOn: "Advanced"
- assertVisible: "Advanced controls"
- tapOn: "QWEN_2B"
- tapOn: "Export diagnostics"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-b-03-after-diagnostics"
- back
- tapOn: "Message"
- eraseText
- inputText: "Model switch sanity check"
- tapOn: "Send"
- assertVisible: "Model switch sanity check"
- runFlow:
    when:
      visible: "Runtime: Error"
    commands:
      - tapOn: "Refresh runtime checks"
- assertNotVisible: "UI-RUNTIME-001"
- takeScreenshot: "scenario-b-04-after-switch-send"
