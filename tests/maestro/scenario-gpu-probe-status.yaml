appId: com.pocketagent.android
tags:
  - gpu
  - diagnostics
---
- runFlow: shared/bootstrap-runtime-ready.yaml
- runFlow:
    when:
      visible: "Open advanced controls"
    commands:
      - tapOn: "Open advanced controls"
- runFlow:
    when:
      visible: "Advanced"
    commands:
      - tapOn: "Advanced"
- assertVisible: "Advanced controls"
- runFlow:
    when:
      visible: "Validating GPU support..."
    commands:
      - extendedWaitUntil:
          notVisible: "Validating GPU support..."
          timeout: 300000
- runFlow:
    when:
      visible: "Enable GPU acceleration"
    commands:
      - tapOn: "Enable GPU acceleration"
- runFlow:
    when:
      visible: "Validating GPU support..."
    commands:
      - extendedWaitUntil:
          notVisible: "Validating GPU support..."
          timeout: 300000
