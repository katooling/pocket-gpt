appId: com.pocketagent.android
tags:
  - cloud-smoke
  - sessions
---
- launchApp:
    clearState: true
- runFlow:
    when:
      visible: "Welcome to Pocket GPT"
    commands:
      - tapOn: "Next"
      - extendedWaitUntil:
          visible: "Step 2 of 3"
          timeout: 20000
      - tapOn: "Next"
      - extendedWaitUntil:
          visible: "Step 3 of 3"
          timeout: 20000
      - tapOn: "Get started"
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
- runFlow:
    when:
      visible: "Get ready"
    commands:
      - tapOn: "Get ready"
- tapOn:
    id: "session_drawer_button"
- assertVisible: "Create session"
- assertVisible: "New chat"
- swipe:
    from:
      id: "session_row_active"
    direction: LEFT
- assertVisible: "Undo"
- assertVisible: "No sessions yet"
- tapOn: "Undo"
- assertVisible: "Create session"
- assertVisible: "New chat"
- takeScreenshot: "cloud-session-drawer-after-delete"
